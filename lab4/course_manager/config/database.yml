default: &default
  adapter: postgresql
  encoding: unicode
  host: localhost
  username: postgres
  password: 12345
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: course_manager_development

test:
  <<: *default
  database: course_manager_test

production:
  <<: *default
  database: course_manager_production